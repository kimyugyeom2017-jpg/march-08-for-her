<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> Women's Day </title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Dancing+Script:wght@500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    background: #000;;
    color:#c65460;
}

/* Canvas */
canvas{
    position:fixed;
    top:0;
    left:0;
}

/* Text container */
.container{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    width:88%;
    max-width:700px;
}

/* Main text */
#text{
    font-family:'Cormorant Garamond', serif;
    font-size:clamp(20px,5vw,30px);
    line-height:1.8;
    min-height:120px;
    letter-spacing:1px;
    transition:opacity 3s ease;

    white-space:pre-line;
    word-break:keep-all;

    color:#ea8190;
    text-shadow: 0 0 4px rgba(122,30,44,0.25);
}

/* Handwritten */
.hand{
    font-family:'Dancing Script', cursive;
    font-size:clamp(26px,6vw,40px);
}

/* Final wish */
#finalWish{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(0.8);
    font-size:clamp(28px,7vw,42px);
    font-family:'Dancing Script', cursive;
    opacity:0;
    transition:1.5s ease;
    text-align:center;
    width:90%;

    color:#9b2226;
    text-shadow: 0 0 10px rgba(155,34,38,0.4);
}

.showWish{
    opacity:1 !important;
    transform:translate(-50%,-50%) scale(1);
}

/* Hint */
#hint{
    position:absolute;
    bottom:40px;
    width:100%;
    text-align:center;
    font-size:12px;
    opacity:0.25;
    letter-spacing:3px;
    transition:2s;
}

/* Click Heart */
.click-heart{
    position:fixed;
    font-size:20px;
    animation:floatUp 1s ease forwards;
    pointer-events:none;
}

@keyframes floatUp{
    0%{transform:translate(-50%,-50%) scale(1);opacity:1;}
    100%{transform:translate(-50%,-120%) scale(1.8);opacity:0;}
}
</style>
</head>

<body>

<canvas id="dust"></canvas>

<div class="container">
    <div id="text"></div>
</div>

<div id="finalWish">Chúc chị ngày 08/03 vui vẻ</div>
<div id="hint">chạm nhẹ</div>

<script>

/* ===== CLICK HEART EFFECT ===== */
function handleClick(e){

    nextScene();

    const heart=document.createElement("div");
    heart.className="click-heart";
    heart.innerHTML="❤";

    heart.style.left = (e.clientX) + "px";
    heart.style.top  = (e.clientY) + "px";
    heart.style.color="#c36b7c";

    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),1000);
}

document.addEventListener("click", handleClick);

document.addEventListener("touchstart", function(e){
    const touch=e.touches[0];
    handleClick(touch);
});


/* ===== PARTICLES ===== */
const canvas = document.getElementById("dust");
const ctx = canvas.getContext("2d");

function resizeCanvas(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let particles=[];
let stage="float";
let heartScale=1;

for(let i=0;i<120;i++){
    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        r:Math.random()*1.5
    });
}

function heartShape(t){
    return {
        x:16*Math.pow(Math.sin(t),3),
        y:-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))
    };
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.shadowColor = "rgba(255,255,255,0.5)";
    ctx.shadowBlur = 6;
    ctx.fillStyle="rgba(255,255,255,0.2)";
    ctx.beginPath();

    for(let p of particles){
        ctx.moveTo(p.x,p.y);
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2,true);
    }

    ctx.fill();
    update();
    requestAnimationFrame(draw);
}

function update(){

    if(stage==="float"){
        for(let p of particles){
            p.y-=0.3;
            if(p.y<0){
                p.y=canvas.height;
                p.x=Math.random()*canvas.width;
            }
        }
    }

    if(stage==="gather"){
        let cx=canvas.width/2;
        let cy=canvas.height/2;

        particles.forEach((p,i)=>{
            let t=(i/particles.length)*Math.PI*2;
            let heart=heartShape(t);
            let tx=cx+heart.x*10*heartScale;
            let ty=cy+heart.y*10*heartScale;
            p.x+=(tx-p.x)*0.05;
            p.y+=(ty-p.y)*0.05;
        });
    }

    if(stage==="explode"){
        particles.forEach(p=>{
            p.x+=(Math.random()-0.5)*20;
            p.y+=(Math.random()-0.5)*20;
        });
    }
}

draw();


/* ===== CONTENT ===== */
let index=0;
let typing=false;

const scenes=[
" Có những ngày tháng Ba đến rất khẽ.",
" Nhẹ như ánh sáng trượt qua khung cửa.",
" Không gọi tên ai.",
" Chỉ đủ để lòng người dịu xuống.",
" Và đủ để nhớ về một người."
];

function typeWriter(text,element,speed=45,isHand=false){
    let i=0;
    typing=true;
    element.innerHTML="";

    if(isHand) element.classList.add("hand");
    else element.classList.remove("hand");

    function t(){
        if(i<text.length){
            element.innerHTML+=text.charAt(i);
            i++;
            setTimeout(t,speed);
        }else typing=false;
    }
    t();
}

function nextScene(){
    if(typing) return;

    if(index<scenes.length){
        typeWriter(scenes[index],document.getElementById("text"));
        index++;
    }
    else if(index===scenes.length){

        document.getElementById("hint").style.opacity=0;

        setTimeout(()=>{
            typeWriter(
            "Với riêng chị — tháng Ba này ấm hơn một chút.",
            document.getElementById("text"),
            60,
            true);
        },1500);

        setTimeout(()=>{stage="gather";},6500);
        setTimeout(()=>{stage="explode";},11000);
        setTimeout(()=>{
            document.getElementById("finalWish").classList.add("showWish");
            document.getElementById("text").style.opacity="0";
        },12000);

        index++;
    }
}
</script>

</body>
</html>
