<script>

const canvas = document.getElementById("dust");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
let stage = "float";
let heartScale = 1;
let beatTime = 0;
let index = 0;
let typing = false;

const scenes=[
" Có những ngày tháng Ba đến rất khẽ.",
" Nhẹ như ánh sáng trượt qua khung cửa.",
" Không gọi tên ai.",
" Chỉ đủ để lòng người dịu xuống.",
" Và đủ để nhớ về một người."
];

// ===== RESET FUNCTION =====
function resetExperience(){
    particles = [];
    stage="float";
    heartScale=1;
    beatTime=0;
    index=0;
    typing=false;

    document.getElementById("text").style.opacity="1";
    document.getElementById("text").innerHTML="";
    document.getElementById("finalWish").classList.remove("showWish");

    for(let i=0;i<140;i++){
        particles.push({
            x:Math.random()*canvas.width,
            y:Math.random()*canvas.height,
            r:Math.random()*1.4
        });
    }
}

// ===== HEART SHAPE =====
function heartShape(t){
    return {
        x: 16*Math.pow(Math.sin(t),3),
        y: -(13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t))
    };
}

// ===== DRAW LOOP =====
function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="rgba(255,220,180,0.25)";
    ctx.beginPath();

    for(let p of particles){
        ctx.moveTo(p.x,p.y);
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2,true);
    }

    ctx.fill();
    update();
    requestAnimationFrame(draw);
}

function update(){

    if(stage==="float"){
        particles.forEach(p=>{
            p.y -= 0.25;
            if(p.y<0){
                p.y = canvas.height;
                p.x = Math.random()*canvas.width;
            }
        });
    }

    if(stage==="gather"){
        let cx = canvas.width/2;
        let cy = canvas.height/2;

        particles.forEach((p,i)=>{
            let t = (i/particles.length) * Math.PI*2;
            let heart = heartShape(t);
            let targetX = cx + heart.x * 9 * heartScale;
            let targetY = cy + heart.y * 9 * heartScale;

            p.x += (targetX - p.x) * 0.04;
            p.y += (targetY - p.y) * 0.04;
        });
    }

    if(stage==="beat"){
        beatTime += 0.04;
        heartScale = 1 + Math.sin(beatTime) * 0.07;

        if(beatTime > Math.PI * 4){
            stage = "fade";
        }
    }

    if(stage==="fade"){
        particles.forEach(p=>{
            p.x += (Math.random()-0.5)*3;
            p.y += (Math.random()-0.5)*3;
            p.r *= 0.995;
        });
    }
}

// ===== TYPEWRITER =====
function typeWriter(text, element, speed=50, isHand=false){
    let i=0;
    typing=true;
    element.innerHTML="";
    if(isHand){element.classList.add("hand");}
    else{element.classList.remove("hand");}

    function t(){
        if(i<text.length){
            element.innerHTML+=text.charAt(i);
            i++;
            setTimeout(t,speed);
        }else{
            typing=false;
            setTimeout(nextScene,1500);
        }
    }
    t();
}

// ===== FLOW CONTROL =====
function nextScene(){

    if(index<scenes.length){
        typeWriter(scenes[index],document.getElementById("text"));
        index++;
    }
    else if(index===scenes.length){

        setTimeout(()=>{
            typeWriter(
            "Với riêng chị — tháng Ba này ấm hơn một chút.",
            document.getElementById("text"),
            60,
            true);
        },1500);

        setTimeout(()=>{stage="gather";},6500);
        setTimeout(()=>{stage="beat";},9000);
        setTimeout(()=>{stage="fade";},12500);
        setTimeout(()=>{
            document.getElementById("finalWish").classList.add("showWish");
            document.getElementById("text").style.opacity="0";
        },14000);

        index++;
    }
}

// ===== AUTO START =====
window.onload = function(){
    resetExperience();
    draw();
    setTimeout(nextScene,1000);
}

</script>
